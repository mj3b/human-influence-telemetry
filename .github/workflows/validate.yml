name: HIT Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Check deterministic fixture formatting
        run: python scripts/check_fixture_format.py

      - name: Validate HIT 0.4.0 release contract
        shell: bash
        run: |
          set -o pipefail
          python scripts/validate.py 2>&1 | tee hit-validation-report.txt

      - name: Run executable assessment conformance
        run: >-
          python -m src.cli conformance --all --format json
          --output hit-conformance-report.json

      - name: Smoke-test public CLI commands
        run: python scripts/validate_v050_cli.py

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hit-validation-reports
          path: |
            hit-validation-report.txt
            hit-conformance-report.json
          if-no-files-found: error
