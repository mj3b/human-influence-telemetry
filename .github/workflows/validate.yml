name: HIT Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Check fixture readability
        run: python scripts/check_fixture_format.py

      - name: Validate released HIT artifacts
        run: python scripts/validate.py

      - name: Validate HIT v0.4.0 candidate contract
        run: python scripts/validate_v040_candidate.py

      - name: Validate HIT v0.4.0 boundary fixtures
        run: python scripts/validate_v040_boundaries.py

      - name: Validate HIT v0.4.0 case migrations
        run: python scripts/validate_v040_migrations.py

      - name: Validate HIT v0.4.0 release readiness
        run: python scripts/validate_v040_release_readiness.py
